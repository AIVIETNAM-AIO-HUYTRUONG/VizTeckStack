name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  deploy-web-production:
    name: Deploy apps/web → Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy apps/web to Vercel Production
        run: |
          npx vercel pull --cwd apps/web --token "$VERCEL_TOKEN" --yes
          npx vercel build --cwd apps/web --prod --token "$VERCEL_TOKEN" --yes
          npx vercel deploy --prebuilt --cwd apps/web --prod --token "$VERCEL_TOKEN" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-admin-production:
    name: Deploy apps/admin → Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy apps/admin to Vercel Production
        run: |
          npx vercel pull --cwd apps/admin --token "$VERCEL_TOKEN" --yes
          npx vercel build --cwd apps/admin --prod --token "$VERCEL_TOKEN" --yes
          npx vercel deploy --prebuilt --cwd apps/admin --prod --token "$VERCEL_TOKEN" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-web-production, deploy-admin-production]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
