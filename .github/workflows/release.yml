name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  deploy-web-production:
    name: Deploy apps/web → Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Generate proto types
        run: cd packages/proto && node generate.js

      - name: Build
        run: pnpm build

      - name: Deploy apps/web to Vercel Production
        run: |
          npx vercel pull --token ${{ secrets.VERCEL_TOKEN }} --yes
          npx vercel build --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
          npx vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

  deploy-admin-production:
    name: Deploy apps/admin → Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Generate proto types
        run: cd packages/proto && node generate.js

      - name: Build
        run: pnpm build

      - name: Deploy apps/admin to Vercel Production
        run: |
          npx vercel pull --token ${{ secrets.VERCEL_TOKEN }} --yes
          npx vercel build --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
          npx vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-web-production, deploy-admin-production]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
